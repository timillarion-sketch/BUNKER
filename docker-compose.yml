services:
  db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5433:5432"
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bunker-app-redis-1
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate-runner
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "pnpm --filter @workspace/db run migrate"
    restart: no

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_URL: https://176.12.72.246.nip.io
      FRONTEND_URL: https://176.12.72.246.nip.io
      VK_CLIENT_ID: ${VK_CLIENT_ID}
      VK_CLIENT_SECRET: ${VK_CLIENT_SECRET}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET}
      YANDEX_REDIRECT_URI: https://176.12.72.246.nip.io/api/auth/yandex/callback
      REDIS_URL: redis://:${REDIS_PASSWORD}@bunker-app-redis-1:6379
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: bunker-app-n8n-1
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n_data:/home/node/.local/share/n8n
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_HOST=176.12.72.246.nip.io
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - N8N_PATH=/n8n/
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer
    restart: unless-stopped
    expose:
      - 8080
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-runner
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /root/bunker-app/letsencrypt-webroot/.well-known/acme-challenge:/usr/share/nginx/html/.well-known/acme-challenge
      - /root/bunker-app/nginx.conf:/etc/nginx/conf.d/default.conf
      - /root/bunker-app/.adminer_passwd:/etc/nginx/.adminer_passwd:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  n8n_data:
